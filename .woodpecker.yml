# Woodpecker CI/CD for immich-bridge.
#
# PR/manual: backend checks, frontend build, image build dry run.
# main push: backend checks, frontend build, GHCR publish, GitOps image bump.
#
# Required Woodpecker secrets:
#   ghcr_token   - token with package write access for ghcr.io/barryw/immich-bridge
#   github_token - token with contents write access to barryw/infrastructure

labels:
  platform: linux/amd64

when:
  - event: [push, pull_request, manual]

steps:
  lint:
    image: python:3.12-slim
    commands:
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run ruff check src tests
      - uv run ruff format --check src tests

  typecheck:
    image: python:3.12-slim
    commands:
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run mypy src
    depends_on: [lint]

  test:
    image: python:3.12-slim
    environment:
      IMMICH_URL: http://immich.test/api
    commands:
      - pip install uv
      - uv sync --frozen --all-extras
      - uv run pytest --tb=short -q
    depends_on: [typecheck]

  frontend-build:
    image: node:26-alpine
    commands:
      - cd frontend
      - npm ci
      - npm run build

  image-dry-run:
    image: gcr.io/kaniko-project/executor:debug
    when:
      - event: [pull_request, manual]
    commands:
      - /kaniko/executor --dockerfile=Dockerfile --context=. --no-push
    depends_on: [test, frontend-build]

  image-publish:
    image: woodpeckerci/plugin-kaniko@sha256:b88802ba66af95ee28a8ffde08715631ec2892e024b2c74e90e19f73a5c2c602
    when:
      - event: push
        branch: main
    settings:
      repo: barryw/immich-bridge
      dockerfile: Dockerfile
      registry: ghcr.io
      username: barryw
      password:
        from_secret: ghcr_token
      tags:
        - "sha-${CI_COMMIT_SHA:0:12}"
        - latest
    depends_on: [test, frontend-build]

  gitops-image-bump:
    image: alpine:3.21
    when:
      - event: push
        branch: main
    environment:
      GH_TOKEN:
        from_secret: github_token
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apk add --no-cache git github-cli
      - SHORT_SHA=$(printf "%.12s" "$CI_COMMIT_SHA")
      - IMAGE_TAG="sha-$SHORT_SHA"
      - BRANCH="ci/immich-bridge-$IMAGE_TAG"
      - APP_MANIFEST="$PWD/deploy/kubernetes/immich-bridge/resources.yaml"
      - test -f "$APP_MANIFEST"
      - git clone "https://x-access-token:$GITHUB_TOKEN@github.com/barryw/infrastructure.git" /tmp/infrastructure
      - cd /tmp/infrastructure
      - git config user.email "ci@woodpecker.local"
      - git config user.name "Woodpecker CI"
      - git checkout -b "$BRANCH"
      - test -d kubernetes-default/immich-bridge
      - cp "$APP_MANIFEST" kubernetes-default/immich-bridge/resources.yaml
      - sed -i "s#ghcr.io/barryw/immich-bridge:[^[:space:]]*#ghcr.io/barryw/immich-bridge:$IMAGE_TAG#g" kubernetes-default/immich-bridge/resources.yaml
      - git diff --quiet && { echo "GitOps manifest already references $IMAGE_TAG"; exit 0; }
      - git add kubernetes-default/immich-bridge/resources.yaml
      - 'git commit -m "deploy: immich-bridge $IMAGE_TAG"'
      - git push --force-with-lease origin "$BRANCH"
      - 'PR_URL=$(gh pr create --repo barryw/infrastructure --base main --head "$BRANCH" --title "deploy: immich-bridge $IMAGE_TAG" --body "Updates immich-bridge to ghcr.io/barryw/immich-bridge:$IMAGE_TAG.")'
      - gh pr merge "$PR_URL" --repo barryw/infrastructure --squash --delete-branch --admin
    depends_on: [image-publish]
