name: immich-bridge

services:
  app:
    image: immich-bridge:latest
    build: .
    environment:
      - IMMICH_URL=${IMMICH_URL:-http://immich-server:2283/api}
      - ADMIN_PORT=${ADMIN_PORT:-8080}
      - WEBDAV_PORT=${WEBDAV_PORT:-8081}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - AUTH_CACHE_TTL_SECONDS=${AUTH_CACHE_TTL_SECONDS:-300}
      - AUTH_FAILURE_LIMIT=${AUTH_FAILURE_LIMIT:-10}
      - AUTH_FAILURE_WINDOW_SECONDS=${AUTH_FAILURE_WINDOW_SECONDS:-300}
      - ALBUM_CACHE_TTL_SECONDS=${ALBUM_CACHE_TTL_SECONDS:-60}
      - SEARCH_CACHE_TTL_SECONDS=${SEARCH_CACHE_TTL_SECONDS:-30}
      - ASSET_CACHE_TTL_SECONDS=${ASSET_CACHE_TTL_SECONDS:-300}
      - SEARCH_PAGE_SIZE=${SEARCH_PAGE_SIZE:-500}
      - SEARCH_MAX_PAGES=${SEARCH_MAX_PAGES:-20}
      - ALBUM_FOLDER_SPLIT_THRESHOLD=${ALBUM_FOLDER_SPLIT_THRESHOLD:-200}
      - DAY_FOLDER_SPLIT_THRESHOLD=${DAY_FOLDER_SPLIT_THRESHOLD:-1000}
      - WEBDAV_MAX_REQUEST_BODY_BYTES=${WEBDAV_MAX_REQUEST_BODY_BYTES:-1048576}
      - WEBDAV_MAX_UPLOAD_BYTES=${WEBDAV_MAX_UPLOAD_BYTES:-10737418240}
      - WEBDAV_MAX_PATH_LENGTH=${WEBDAV_MAX_PATH_LENGTH:-2048}
      - WEBDAV_MAX_PATH_SEGMENTS=${WEBDAV_MAX_PATH_SEGMENTS:-32}
      - WEBDAV_MAX_CONCURRENT_REQUESTS=${WEBDAV_MAX_CONCURRENT_REQUESTS:-32}
      - WEBDAV_MAX_CONCURRENT_STREAMS=${WEBDAV_MAX_CONCURRENT_STREAMS:-8}
      - BLOB_CACHE_ENABLED=${BLOB_CACHE_ENABLED:-true}
      - BLOB_CACHE_DIR=${BLOB_CACHE_DIR:-/var/cache/immich-bridge/blob-cache}
      - BLOB_CACHE_MAX_BYTES=${BLOB_CACHE_MAX_BYTES:-1073741824}
      - BLOB_CACHE_MAX_RANGE_BYTES=${BLOB_CACHE_MAX_RANGE_BYTES:-8388608}
      - BLOB_CACHE_TTL_SECONDS=${BLOB_CACHE_TTL_SECONDS:-86400}
      - UPLOAD_RECEIPT_TTL_SECONDS=${UPLOAD_RECEIPT_TTL_SECONDS:-1800}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-console}
      - IMMICH_BRIDGE_METRICS=${IMMICH_BRIDGE_METRICS:-false}
    ports:
      - "${ADMIN_PORT:-8080}:8080"
      - "${WEBDAV_PORT:-8081}:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - blobcache:/var/cache/immich-bridge
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - |
        if [ -n "$${REDIS_PASSWORD}" ]; then
          redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
        else
          redis-server --appendonly yes
        fi
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'if [ -n "$$REDIS_PASSWORD" ]; then redis-cli -a "$$REDIS_PASSWORD" ping; else redis-cli ping; fi',
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redisdata:
  blobcache:
